version: "3.9"

services:
  # ── PostgreSQL 15 ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: flights
      POSTGRES_PASSWORD: flights
      POSTGRES_DB: flights_sales
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flights -d flights_sales"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Zookeeper (required by Kafka) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ── Kafka ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application (FastAPI) ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://flights:flights@postgres:5432/flights_sales"
      REDIS_URL: "redis://redis:6379/0"
      KAFKA_BROKERS: "kafka:29092"
      ENVIRONMENT: "development"
      DEBUG: "true"
      LOG_LEVEL: "INFO"
      TRIP_CLAW_API_URL: "http://localhost:8080/v1"
      TRIP_CLAW_API_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Extraction Worker ──────────────────────────────────────
  extraction-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "workers.extraction_worker"]
    environment:
      DATABASE_URL: "postgresql+asyncpg://flights:flights@postgres:5432/flights_sales"
      REDIS_URL: "redis://redis:6379/0"
      KAFKA_BROKERS: "kafka:29092"
      ENVIRONMENT: "development"
      LOG_LEVEL: "INFO"
      TRIP_CLAW_API_URL: "http://localhost:8080/v1"
      TRIP_CLAW_API_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pgdata:
